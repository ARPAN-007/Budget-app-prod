apiVersion: apps/v1
kind: Deployment

metadata:
  name: expense-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: expense-service

  template:

    metadata:
      labels:
        app: expense-service

    spec:

      containers:
        - name: expense-service

          image: arpanmanna/finops-expense:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 8002