apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:

    metadata:
      labels:
        app: auth-service

    spec:

      containers:
        - name: auth-service

          image: finops-auth:v4

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8001