apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-service

  template:

    metadata:
      labels:
        app: ai-service

    spec:

      containers:
        - name: ai-service

          image: finops-ai:v2

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8003