grafana:

  adminPassword: admin

  additionalDataSources:

    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      isDefault: false

  sidecar:
    dashboards:
      enabled: true

    datasources:
      enabled: true

  dashboardProviders:
    dashboardproviders.yaml:

      apiVersion: 1

      providers:

        - name: default
          orgId: 1
          folder: FinOps
          type: file
          disableDeletion: false
          editable: true

          options:
            path: /var/lib/grafana/dashboards/default

  dashboardsConfigMaps:
    default: grafana-dashboards

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false