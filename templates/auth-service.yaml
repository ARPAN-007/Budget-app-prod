apiVersion: v1
kind: Service

metadata:
  name: {{ .Values.auth.name }}

  labels:
    app: {{ .Values.auth.name }}
spec:

  selector:
    app: {{ .Values.auth.name }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.auth.service.port }}
      targetPort: {{ .Values.auth.containerPort }}

  type: ClusterIP