name: Terraform

on:
  push:
    branches:
      - master

    paths:
      - 'finops-chart/infra/terraform/**'

jobs:

  validate:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: finops-chart/infra/terraform

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - run: terraform fmt -check

      - run: terraform validate