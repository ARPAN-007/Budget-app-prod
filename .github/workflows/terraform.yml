name: Terraform

on:
  push:
    branches:
      - master
    paths:
      - 'infra/terraform/**'
jobs:

  validate:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - run: terraform fmt -check

      - run: terraform validate

      - run: terraform plan -out=tfplan