name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - master

jobs:

  build-ai:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build AI Image
        run: |
          docker build -t arpanmanna/finops-ai:v3 ./backend/ai-service

      - name: Run Trivy Scan AI
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-ai:v3
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push AI Image
        run: |
          docker push arpanmanna/finops-ai:v1


  build-auth:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Auth Image
        run: |
          docker build -t arpanmanna/finops-auth:v1 ./backend/auth-service

      - name: Run Trivy Scan Auth
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-auth:v1
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Auth Image
        run: |
          docker push arpanmanna/finops-auth:v1


  build-expense:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Expense Image
        run: |
          docker build -t arpanmanna/finops-expense:v1 ./backend/expense-service

      - name: Run Trivy Scan Expense
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-expense:v1
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Expense Image
        run: |
          docker push arpanmanna/finops-expense:v1