name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - master
permissions:
  contents: write

jobs:

#################################################
# DETECT CHANGES
#################################################

  detect-changes:

    runs-on: ubuntu-latest

    outputs:
      ai: ${{ steps.filter.outputs.ai }}
      auth: ${{ steps.filter.outputs.auth }}
      expense: ${{ steps.filter.outputs.expense }}
      helm: ${{ steps.filter.outputs.helm }}

    steps:

      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ai:
              - '/backend/ai-service/**'

            auth:
              - '/backend/auth-service/**'

            expense:
              - '/backend/expense-service/**'

            helm:
              - 'templates/**'
              - 'k8s/**'

#################################################
# AI SERVICE
#################################################

  build-ai:

    needs: detect-changes

    if: needs.detect-changes.outputs.ai == 'true'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build AI Image
        run: |
          docker build \
          -t arpanmanna/finops-ai:${SHORT_SHA} \
          ./backend/ai-service

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-ai:${{ env.SHORT_SHA }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push AI Image
        run: |
          docker push arpanmanna/finops-ai:${SHORT_SHA}

#################################################
# AUTH SERVICE
#################################################

  build-auth:

    needs: detect-changes

    if: needs.detect-changes.outputs.auth == 'true'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Auth Image
        run: |
          docker build \
          -t arpanmanna/finops-auth:${SHORT_SHA} \
          ./backend/auth-service

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-auth:${{ env.SHORT_SHA }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push Auth Image
        run: |
          docker push arpanmanna/finops-auth:${SHORT_SHA}

#################################################
# EXPENSE SERVICE
#################################################

  build-expense:

    needs: detect-changes

    if: needs.detect-changes.outputs.expense == 'true'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Expense Image
        run: |
          docker build \
          -t arpanmanna/finops-expense:${SHORT_SHA} \
          ./backend/expense-service

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-expense:${{ env.SHORT_SHA }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push Expense Image
        run: |
          docker push arpanmanna/finops-expense:${SHORT_SHA}

#################################################
# UPDATE HELM VALUES
#################################################

  update-helm:

    needs:
      - detect-changes
      - build-ai
      - build-auth
      - build-expense

    if: always()

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Update all image Tag
        if: needs.detect-changes.outputs.ai == 'true'
        run: |
          sed -i "s/tag: .*/tag: ${SHORT_SHA}/" finops-chart/values.yaml

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email actions@github.com

          git add .

          git commit -m "[skip ci] update image tags ${SHORT_SHA}" || echo "No changes"

          git push