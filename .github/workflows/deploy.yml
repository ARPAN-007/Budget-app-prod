name: Build and Push Images

on:
  push:
    branches:
      - master

jobs:

  build-ai:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build AI Image
        run: |
          docker build -t arpanmanna/finops-ai:v3 ./backend/ai-service

      - name: Push AI Image
        run: |
          docker push arpanmanna/finops-ai:v3

  build-expense:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Expense Image
        run: |
          docker build -t arpanmanna/finops-expense:v1 ./backend/expense-service

      - name: Push Expense Image
        run: |
          docker push arpanmanna/finops-expense:v1

  build-auth:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Auth Image
        run: |
          docker build -t arpanmanna/finops-auth:v1 ./backend/auth-service

      - name: Push Auth Image
        run: |
          docker push arpanmanna/finops-auth:v1