name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - master

env:
  SHA_TAG: ${{ github.sha }}

jobs:

  build-ai:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build AI Image
        run: |
          docker build \
          -t arpanmanna/finops-ai:${SHORT_SHA} \
          ./backend/ai-service

      - name: Run Trivy Scan AI
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arpanmanna/finops-ai:${{ env.SHORT_SHA }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push AI Image
        run: |
          docker push arpanmanna/finops-ai:${SHORT_SHA}

      - name: Update AI Deployment
        run: |
          sed -i "s|image:.*finops-ai.*|image: arpanmanna/finops-ai:${SHORT_SHA}|g" k8s/ai/deployment.yaml

      - name: Commit AI Manifest
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          git add k8s/ai/deployment.yaml

          git commit -m "Update AI image to ${SHORT_SHA}" || echo "No changes"

          git push


