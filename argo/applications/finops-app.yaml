apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: finops-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ARPAN-007/Budget-app-prod.git
    targetRevision: master
    path: finops-chart

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true